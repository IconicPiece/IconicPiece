<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Iconic Piece — Members Only</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0D0D0D;
      --bone: #F7F6F3;
      --font-sans: 'Barlow Condensed', sans-serif;
      --font-serif: 'Playfair Display', serif;
      --font-mono: Menlo, monospace;
      --ease-out-soft: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--ink);
      color: var(--bone);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: var(--bone); color: var(--ink); }
    ::-webkit-scrollbar { width: 0; background: transparent; }

    /* Noise canvas */
    .noise-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.10;
      pointer-events: none;
      mix-blend-mode: difference;
      image-rendering: pixelated;
      z-index: 0;
    }

    /* Gate container */
    .gate {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 0 24px;
      width: 100%;
      max-width: 480px;
      opacity: 0;
      animation: fadeIn 1.8s var(--ease-out-soft) 0.3s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Wordmark */
    .gate-wordmark {
      font-size: clamp(48px, 14vw, 96px);
      font-weight: 900;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      line-height: 0.85;
      text-align: center;
      color: var(--bone);
      filter: drop-shadow(0 0 40px rgba(247,246,243,0.08));
      margin-bottom: 48px;
    }

    /* Divider */
    .gate-divider {
      width: 1px;
      height: 40px;
      background: rgba(247, 246, 243, 0.15);
      margin-bottom: 48px;
    }

    /* Eyebrow label */
    .gate-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(247, 246, 243, 0.35);
      margin-bottom: 20px;
      align-self: flex-start;
    }

    /* Input row */
    .gate-input-row {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .gate-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(247, 246, 243, 0.2);
      color: var(--bone);
      font-family: var(--font-mono);
      font-size: 14px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 12px 0;
      outline: none;
      caret-color: var(--bone);
      transition: border-color 0.4s ease;
    }

    .gate-input::placeholder {
      color: rgba(247, 246, 243, 0.2);
      letter-spacing: 0.25em;
    }

    .gate-input:focus {
      border-bottom-color: rgba(247, 246, 243, 0.6);
    }

    /* Submit button */
    .gate-btn {
      align-self: flex-end;
      background: none;
      border: 1px solid rgba(247, 246, 243, 0.2);
      color: var(--bone);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 12px 28px;
      cursor: pointer;
      transition: border-color 0.3s ease, color 0.3s ease, background 0.3s ease;
      margin-top: 4px;
    }

    .gate-btn:hover {
      border-color: var(--bone);
      background: rgba(247, 246, 243, 0.06);
    }

    .gate-btn:active {
      background: rgba(247, 246, 243, 0.12);
    }

    /* Error message */
    .gate-error {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(247, 246, 243, 0.4);
      margin-top: 20px;
      min-height: 14px;
      align-self: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .gate-error.visible {
      opacity: 1;
    }

    /* Shake animation on wrong password */
    @keyframes shake {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(-8px); }
      30%  { transform: translateX(8px); }
      45%  { transform: translateX(-6px); }
      60%  { transform: translateX(6px); }
      75%  { transform: translateX(-3px); }
      90%  { transform: translateX(3px); }
      100% { transform: translateX(0); }
    }

    .gate-input-row.shake {
      animation: shake 0.5s var(--ease-out-soft);
    }

    /* Footer stamp */
    .gate-stamp {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 12px;
      color: rgba(247, 246, 243, 0.15);
      white-space: nowrap;
      z-index: 10;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .gate { animation: none; opacity: 1; }
      .gate-input-row.shake { animation: none; }
    }
  </style>
</head>
<body>

  <canvas class="noise-canvas" id="noiseCanvas"></canvas>

  <div class="gate">
    <h1 class="gate-wordmark">Iconic<br>Piece</h1>
    <div class="gate-divider"></div>

    <p class="gate-label">Members Only — Enter Access Code</p>

    <div class="gate-input-row" id="inputRow">
      <input
        class="gate-input"
        id="passwordInput"
        type="password"
        placeholder="· · · · · · · · · ·"
        autocomplete="off"
        spellcheck="false"
        autofocus
      />
      <button class="gate-btn" id="submitBtn">Enter</button>
    </div>

    <p class="gate-error" id="errorMsg">Access denied — invalid code</p>
  </div>

  <p class="gate-stamp">SS 2025 / Vol. 01</p>

  <script>
    // ── Noise canvas ──────────────────────────────────────────
    (function () {
      var canvas = document.getElementById('noiseCanvas');
      var ctx = canvas.getContext('2d', { alpha: false });
      var raf;

      function resize() {
        canvas.width  = Math.ceil(window.innerWidth  / 2);
        canvas.height = Math.ceil(window.innerHeight / 2);
      }

      function draw() {
        var w = canvas.width, h = canvas.height;
        var img = ctx.createImageData(w, h);
        var buf = new Uint32Array(img.data.buffer);
        for (var i = 0; i < buf.length; i++) {
          buf[i] = Math.random() < 0.5 ? 0xff000000 : 0xffffffff;
        }
        ctx.putImageData(img, 0, 0);
        raf = requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      resize();

      var noMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (!noMotion) {
        draw();
      } else {
        draw();
        cancelAnimationFrame(raf);
      }
    })();

    // ── Password gate ─────────────────────────────────────────
    (function () {
      // SHA-256 hash of the correct password ("ICONICPIECE")
      // Plain-text password is never stored in source.
      var CORRECT_HASH = 'a864ea0ad9a002754afa8046ed1ce96601d0c8cbf233aa367f81fb6dee5864e4';
      var SESSION_KEY  = 'ip_auth';

      var input     = document.getElementById('passwordInput');
      var inputRow  = document.getElementById('inputRow');
      var submitBtn = document.getElementById('submitBtn');
      var errorMsg  = document.getElementById('errorMsg');

      // Hash a string with SHA-256 via SubtleCrypto (Web Crypto API)
      async function sha256(str) {
        var encoded = new TextEncoder().encode(str.toUpperCase());
        var hashBuffer = await crypto.subtle.digest('SHA-256', encoded);
        var hashArray  = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(function (b) {
          return b.toString(16).padStart(2, '0');
        }).join('');
      }

      function triggerShake() {
        inputRow.classList.remove('shake');
        // Force reflow so re-adding the class re-triggers the animation
        void inputRow.offsetWidth;
        inputRow.classList.add('shake');
        inputRow.addEventListener('animationend', function () {
          inputRow.classList.remove('shake');
        }, { once: true });
      }

      async function attempt() {
        var val = input.value.trim();
        if (!val) return;

        var hash = await sha256(val);

        if (hash === CORRECT_HASH) {
          // Auth confirmed — set session flag and enter site
          sessionStorage.setItem(SESSION_KEY, '1');
          // Fade out smoothly
          document.body.style.transition = 'opacity 0.8s ease';
          document.body.style.opacity = '0';
          setTimeout(function () {
            window.location.replace('home.html');
          }, 800);
        } else {
          triggerShake();
          errorMsg.classList.add('visible');
          input.value = '';
          input.focus();
          // Hide error after 3 seconds
          setTimeout(function () {
            errorMsg.classList.remove('visible');
          }, 3000);
        }
      }

      submitBtn.addEventListener('click', attempt);
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') attempt();
      });
    })();
  </script>

</body>
</html>
